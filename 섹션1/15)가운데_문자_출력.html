<html>
    <head>
        <meta charset="UTF-8">
        <title>가운데_문자_출력</title>
    </head>
    <body>
        <script>
            function solution(s){  
                let answer;
                let mid = Math.floor(s.length/2)
                // if(s.length % 2 !== 0){
                //     answer = s[middle]
                // }else{
                //     answer = s[middle-1] + s[middle] 
                // }
                if(s.length % 2 == 1) answer = s.subString(mid,mid+1);
                else answer = s.substring(mid-1,mid+1);
                return answer;
            }
            console.log(solution("good"));
        </script>
    </body>
</html>
