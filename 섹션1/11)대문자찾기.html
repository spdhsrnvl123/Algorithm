<html>
    <head>
        <meta charset="UTF-8">
        <title>출력결과</title>
    </head>
    <body>
        <script>
            function solution(s){         
                let answer=0;
                for(let i of s){

                    // let num = x.charCodeAt();
                    // if(num >= 65 && num <= 90) answer++;

                    /*
                    let num = x.charCodeAt(); 아스키코드넘버 반환.
                    console.log(num); 
                    */
                    if(i === i.toUpperCase()){
                        answer++;
                    }
                }

                return answer;
            }

            let str="KoreaTimeGood";
            console.log(solution(str));
        </script>
    </body>
