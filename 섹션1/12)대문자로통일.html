<html>
    <head>
        <meta charset="UTF-8">
        <title>출력결과</title>
    </head>
    <!-- 
        추가 Tip : 이런 문제는 한번에 s.toUpperCase()로
        사용하면 한번에 변경되기 때문에 이 방식 사용.
     -->
    <body>
        <script>
            function solution(s){         
                let answer="";
                for(let x of s){
                    let num = x.charCodeAt()
                    if(num >= 97 && num <= 122) answer+=String.fromCharCode(num-32)
                    else answer += x;
                    // if(x === x.toLowerCase()){
                    //     answer += x.toUpperCase();
                    // }else{
                    //     answer+=x;
                    // }
                }
                return answer;

            }

            let str="ItisTimeToStudy";
            console.log(solution(str));
        </script>
    </body>
</html>
