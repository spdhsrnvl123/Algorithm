<html>
    <head>
        <meta charset="UTF-8">
        <title>출력결과</title>
    </head>
    <body>
        <script>
            function solution(arr){
                let answer=arr;
                let sum = 0;
                for(let a = 0; a < arr.length; a++){
                    sum = sum + arr[a];
                }
                for(let i = 0; i < arr.length-1;i++){
                    for(let j=i+1; j< arr.length;j++ ){
                        if(sum - (arr[i]+arr[j]) === 100){
                            arr.splice(j,1);
                            arr.splice(i,1);
                            //splice는 제거되면 앞으로 당겨지기 때문에 뒤에꺼 부터 먼저 지워줌.
                        }
                    }
                }


                return answer;
            }
            
            let arr=[20, 7, 23, 19, 10, 15, 25, 8, 13];
            console.log(solution(arr));
        </script>
    </body>
</html>
