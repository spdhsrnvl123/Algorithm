<html>
    <head>
        <meta charset="UTF-8">
        <title>출력결과</title>
    </head>
    <body>
        <script>
            function solution(arr){  
                let n=arr.length;
                let answer=Array.from({length:n},()=>1);
                // length:n -> n=5면 0~4 index생김
                for(let i=0;i<n;i++){
                    for(let j=0;j<n;j++){
                        if(arr[i] < arr[j]){
                            answer[i]++;
                        }
                    }
                }
                return answer;
            }
            // Array.from 메서드
            // https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Global_Objects/Array/from

            let arr=[87, 89, 92, 100, 76];
            console.log(solution(arr));
        </script>
    </body>
</html>
